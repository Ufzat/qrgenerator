
<!DOCTYPE html>
<html lang="tr">
<head>
    <!-- This interface was created by Ufzat -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MirCode - QR Generator</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.1/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, rgba(30, 27, 75, 1) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(15, 23, 42, 1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(23, 37, 84, 1) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(30, 27, 75, 1) 0px, transparent 50%);
            color: #f8fafc;
            min-height: 100vh;
        }
        .handwriting { 
            font-family: 'Dancing Script', cursive; 
            text-shadow: 0 0 15px rgba(99, 102, 241, 0.6);
        }
        .mio-card { 
            background: rgba(30, 41, 59, 0.4); 
            backdrop-filter: blur(24px); 
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }
        .mio-button {
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .mio-button:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 12px 24px -8px rgba(0,0,0,0.5);
            border-color: rgba(255, 255, 255, 0.2);
        }
        .mio-button-primary {
            background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
            color: white;
            border: none;
            box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.4);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .mio-button-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px -5px rgba(79, 70, 229, 0.6);
            background: linear-gradient(135deg, #4338ca 0%, #2563eb 100%);
        }
        .mio-button-success {
            background: linear-gradient(135deg, #059669 0%, #10b981 100%);
            color: white;
            border: none;
            box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.4);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .mio-button-success:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px -5px rgba(16, 185, 129, 0.6);
            background: linear-gradient(135deg, #047857 0%, #059669 100%);
        }
        .qr-hover:hover .qr-download {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
        .qr-download {
            transform: translateY(10px) scale(0.95);
        }
        .animate-fade-in {
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .qr-svg-wrapper {
            background-color: #ffffff;
            border-radius: 1.25rem;
            padding: 0.5rem;
        }
        .qr-svg-wrapper svg {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        const Icon = ({ name, className = "" }) => {
            const icons = {
                qrCode: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="5" height="5" x="3" y="3" rx="1"/><rect width="5" height="5" x="16" y="3" rx="1"/><rect width="5" height="5" x="3" y="16" rx="1"/><path d="M21 16h-3a2 2 0 0 0-2 2v3"/><path d="M21 21v.01"/><path d="M12 7v3a2 2 0 0 1-2 2H7"/><path d="M3 12h.01"/><path d="M12 3h.01"/><path d="M12 16v.01"/><path d="M16 12h1"/><path d="M21 12v.01"/><path d="M12 21v-1"/></svg>,
                fileType: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline><path d="M9 13v-1h6v1"></path><path d="M12 12v6"></path><path d="M11 18h2"></path></svg>,
                alertCircle: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>,
                plus: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
                checkCircle: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>,
                trash2: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>,
                loader2: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={`${className} animate-spin`}><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg>,
                download: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>,
                fileDown: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline><path d="M12 18v-6"></path><polyline points="9 15 12 18 15 15"></polyline></svg>,
                building: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect><path d="M9 22v-4h6v4"></path><path d="M8 6h.01"></path><path d="M16 6h.01"></path><path d="M12 6h.01"></path><path d="M12 10h.01"></path><path d="M12 14h.01"></path><path d="M16 10h.01"></path><path d="M16 14h.01"></path><path d="M8 10h.01"></path><path d="M8 14h.01"></path></svg>,
                idCard: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 10h2"/><path d="M16 14h2"/><path d="M6.17 15a3 3 0 0 1 5.66 0"/><circle cx="9" cy="11" r="2"/><rect x="2" y="5" width="20" height="14" rx="2"/></svg>,
                link: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
            };
            return icons[name] || null;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('birim'); // 'birim', 'vcard', 'link'
            const [data, setData] = useState([]);
            const [driveLink, setDriveLink] = useState('');
            const [driveFileName, setDriveFileName] = useState('');
            const [isGenerating, setIsGenerating] = useState(false);
            const [error, setError] = useState(null);
            const [qrResults, setQrResults] = useState([]);
            const fileInputRef = useRef(null);

            const downloadTemplate = () => {
                try {
                    const XLSX = window.XLSX;
                    let templateData;
                    let sheetName;
                    let fileName;

                    if (activeTab === 'birim') {
                        templateData = [
                            { 
                                "Satış Direktörlüğü": "ANADOLU SATIŞ DİREKTÖRLÜĞÜ", 
                                "Bölge Müdürlüğü": "KARS BÖLGE MÜDÜRLÜĞÜ", 
                                "Birim Kod": "5912", 
                                "Birim Name": "IĞDIR MERKEZ ATATÜRK", 
                                "DURUM": "1.Parti" 
                            }
                        ];
                        sheetName = "MirCode_Sablon";
                        fileName = "mir-code-kurumsal-sablon.xlsx";
                    } else if (activeTab === 'vcard') {
                        templateData = [
                            {
                                "Ad": "Serhat",
                                "Soyad": "AKGÜL",
                                "Unvan": "Tedarik Zinciri Direktörü",
                                "Kurum": "TARIM KREDİ KOOP",
                                "Cep Telefonu": "+90 532 469 39 91",
                                "İş Telefonu": "+90 312 281 24 00",
                                "E-Posta": "serhat.akgul@tkkoop.com.tr",
                                "Adres": "Saray Mahallesi 134. Cadde No: 3/1 İç Kapı No: 1 06980 Kahramankazan/Ankara"
                            }
                        ];
                        sheetName = "vCard_Sablon";
                        fileName = "mir-code-vcard-sablon.xlsx";
                    }

                    const ws = XLSX.utils.json_to_sheet(templateData);
                    const wb = XLSX.utils.book_new();
                    XLSX.utils.book_append_sheet(wb, ws, sheetName);
                    XLSX.writeFile(wb, fileName);
                } catch (err) {
                    console.error(err);
                    setError("Şablon oluşturulurken bir hata oluştu.");
                }
            };

            const handleFileUpload = (e) => {
                const XLSX = window.XLSX;
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const dataBuffer = new Uint8Array(event.target.result);
                        const wb = XLSX.read(dataBuffer, { type: 'array' });
                        const wsname = wb.SheetNames[0];
                        const ws = wb.Sheets[wsname];
                        const rawData = XLSX.utils.sheet_to_json(ws);

                        if (rawData.length === 0) {
                            setError("Dosya içeriği boş veya okunamadı.");
                            return;
                        }

                        let isValid = false;
                        const finalData = [];

                        for (const row of rawData) {
                            const keys = Object.keys(row);
                            
                            if (activeTab === 'birim') {
                                const kodKey = keys.find(k => k.replace(/\s+/g, '').toLowerCase().includes("birimkod"));
                                const nameKey = keys.find(k => k.replace(/\s+/g, '').toLowerCase().includes("birimname"));
                                
                                if (kodKey && nameKey) {
                                    isValid = true;
                                    // Arama motorunu tetiklememesi için düz metin formatında net bir başlık ekliyoruz
                                    const formattedText = "[ BİRİM BİLGİLERİ ]\n\n" + keys.map(k => `${k.trim()}: ${row[k]}`).join('\n');
                                    finalData.push({
                                        kod: String(row[kodKey] || "").trim(),
                                        isim: String(row[nameKey] || "Birim").trim().replace(/[/\\?%*:|"<>]/g, '-'),
                                        fullContent: formattedText
                                    });
                                }
                            } else if (activeTab === 'vcard') {
                                const adKey = keys.find(k => k.replace(/\s+/g, '').toLowerCase() === "ad");
                                const soyadKey = keys.find(k => k.replace(/\s+/g, '').toLowerCase() === "soyad");
                                
                                if (adKey || soyadKey) {
                                    isValid = true;
                                    const ad = String(row[adKey] || "").trim();
                                    const soyad = String(row[soyadKey] || "").trim();
                                    const unvan = String(row[keys.find(k => k.replace(/\s+/g, '').toLowerCase().includes("unvan"))] || "").trim();
                                    const kurum = String(row[keys.find(k => k.replace(/\s+/g, '').toLowerCase().includes("kurum"))] || "").trim();
                                    const cep = String(row[keys.find(k => k.replace(/\s+/g, '').toLowerCase().includes("cep"))] || "").trim();
                                    const isTel = String(row[keys.find(k => k.replace(/\s+/g, '').toLowerCase().includes("iş"))] || "").trim();
                                    const eposta = String(row[keys.find(k => k.replace(/\s+/g, '').toLowerCase().includes("posta"))] || "").trim();
                                    const adres = String(row[keys.find(k => k.replace(/\s+/g, '').toLowerCase().includes("adres"))] || "").trim();
                                    
                                    const vCardString = `BEGIN:VCARD\nVERSION:3.0\nN:${soyad};${ad};;;\nFN:${ad} ${soyad}\nORG:${kurum}\nTITLE:${unvan}\nTEL;TYPE=CELL:${cep}\nTEL;TYPE=WORK:${isTel}\nEMAIL:${eposta}\nADR;TYPE=WORK:;;${adres};;;;\nEND:VCARD`;

                                    finalData.push({
                                        kod: `${ad} ${soyad}`.trim(),
                                        isim: `${ad}_${soyad}`.trim().replace(/[/\\?%*:|"<> ]/g, '_'),
                                        fullContent: vCardString
                                    });
                                }
                            }
                        }

                        if (!isValid || finalData.length === 0) {
                            setError(activeTab === 'birim' ? "Geçersiz şablon! 'Birim Kod' ve 'Birim Name' başlıklarını kontrol edin." : "Geçersiz şablon! 'Ad' ve 'Soyad' başlıklarını kontrol edin.");
                            return;
                        }

                        setData(finalData);
                        setError(null);
                        setQrResults([]);
                        if (fileInputRef.current) fileInputRef.current.value = "";
                    } catch (err) {
                        console.error("Excel Hatası:", err);
                        setError("Excel dosyası okunurken teknik bir hata oluştu.");
                    }
                };
                reader.readAsArrayBuffer(file);
            };

            const generateQRs = async () => {
                const QRCode = window.QRCode;
                setIsGenerating(true);
                setError(null);
                const results = [];
                
                try {
                    if (activeTab === 'link') {
                        if (!driveLink) {
                            setError("Lütfen geçerli bir bağlantı (URL) girin.");
                            setIsGenerating(false);
                            return;
                        }
                        const svgString = await new Promise((resolve, reject) => {
                            QRCode.toString(driveLink, {
                                type: 'svg',
                                margin: 2,
                                width: 512,
                                color: { dark: '#0f172a', light: '#ffffff' }
                            }, (err, string) => {
                                if (err) reject(err); else resolve(string);
                            });
                        });
                        results.push({ fileName: driveFileName || 'drive-baglantisi', svgString, kod: 'Drive Linki' });
                    } else {
                        for (const item of data) {
                            if (item.fullContent) {
                                const svgString = await new Promise((resolve, reject) => {
                                    QRCode.toString(item.fullContent, {
                                        type: 'svg',
                                        margin: 2,
                                        width: 512,
                                        color: { dark: '#0f172a', light: '#ffffff' }
                                    }, (err, string) => {
                                        if (err) reject(err); else resolve(string);
                                    });
                                });
                                results.push({ fileName: item.isim, svgString, kod: item.kod });
                            }
                        }
                    }
                    
                    if (results.length === 0) {
                        setError("Üretilecek geçerli veri bulunamadı.");
                    } else {
                        setQrResults(results);
                    }
                } catch (err) {
                    console.error("QR Üretim Hatası:", err);
                    setError("QR kodları oluşturulurken bir hata meydana geldi.");
                } finally {
                    setIsGenerating(false);
                }
            };

            const downloadAllAsZip = async () => {
                const JSZip = window.JSZip;
                const zip = new JSZip();
                
                qrResults.forEach((qr) => {
                    zip.file(`${qr.fileName}.svg`, qr.svgString);
                });
                
                const content = await zip.generateAsync({ type: "blob" });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(content);
                
                const dlName = activeTab === 'birim' ? `MirCode_Birim_${new Date().getTime()}.zip` : 
                               activeTab === 'vcard' ? `MirCode_vCard_${new Date().getTime()}.zip` : 
                               `MirCode_Link_${new Date().getTime()}.zip`;
                link.download = dlName;
                link.click();
            };

            const reset = () => {
                setData([]);
                setQrResults([]);
                setDriveLink('');
                setDriveFileName('');
                setError(null);
                if (fileInputRef.current) fileInputRef.current.value = "";
            };

            const switchTab = (tab) => {
                setActiveTab(tab);
                reset();
            };

            return (
                <div className="min-h-screen p-6 md:p-12 selection:bg-indigo-500/30 selection:text-indigo-200">
                    <div className="max-w-5xl mx-auto">
                        <header className="flex flex-col md:flex-row items-center justify-between mb-10 gap-8">
                            <div className="flex flex-col">
                                <div className="flex items-center gap-4 mb-0.5">
                                    <div className="bg-gradient-to-br from-indigo-500 to-blue-600 p-3.5 rounded-[1.4rem] shadow-xl shadow-indigo-500/20 transition-transform duration-500 hover:rotate-[10deg] hover:scale-105 border border-white/10">
                                        <Icon name="qrCode" className="text-white w-8 h-8" />
                                    </div>
                                    <h1 className="text-[2.75rem] font-extrabold tracking-[-0.05em] text-white italic leading-none drop-shadow-md">
                                        Mir<span className="text-indigo-400">code</span>
                                    </h1>
                                </div>
                                <p className="handwriting text-indigo-300 text-2xl ml-[78px] opacity-90 -mt-1">for Miray Tunç</p>
                            </div>
                            
                            {activeTab !== 'link' && (
                                <button 
                                    onClick={downloadTemplate}
                                    className="mio-button flex items-center gap-3 px-7 py-4 rounded-[1.25rem] text-sm font-bold text-white shadow-sm"
                                >
                                    <Icon name="fileType" className="text-indigo-400 w-5 h-5" />
                                    {activeTab === 'birim' ? 'Birim Şablonu İndir' : 'vCard Şablonu İndir'}
                                </button>
                            )}
                        </header>

                        <div className="flex justify-center mb-10">
                            <div className="bg-slate-800/50 p-1.5 rounded-full inline-flex border border-white/10 shadow-inner backdrop-blur-md flex-wrap justify-center gap-1">
                                <button
                                    onClick={() => switchTab('birim')}
                                    className={`px-7 py-3 rounded-full text-sm font-bold transition-all duration-300 ${
                                        activeTab === 'birim' 
                                            ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-500/30 scale-105' 
                                            : 'text-slate-400 hover:text-white'
                                    }`}
                                >
                                    <div className="flex items-center gap-2">
                                        <Icon name="building" className="w-4 h-4" />
                                        Birim Kodları
                                    </div>
                                </button>
                                <button
                                    onClick={() => switchTab('vcard')}
                                    className={`px-7 py-3 rounded-full text-sm font-bold transition-all duration-300 ${
                                        activeTab === 'vcard' 
                                            ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-500/30 scale-105' 
                                            : 'text-slate-400 hover:text-white'
                                    }`}
                                >
                                    <div className="flex items-center gap-2">
                                        <Icon name="idCard" className="w-4 h-4" />
                                        vCard Kartvizitler
                                    </div>
                                </button>
                                <button
                                    onClick={() => switchTab('link')}
                                    className={`px-7 py-3 rounded-full text-sm font-bold transition-all duration-300 ${
                                        activeTab === 'link' 
                                            ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-500/30 scale-105' 
                                            : 'text-slate-400 hover:text-white'
                                    }`}
                                >
                                    <div className="flex items-center gap-2">
                                        <Icon name="link" className="w-4 h-4" />
                                        Drive Bağlantısı
                                    </div>
                                </button>
                            </div>
                        </div>

                        {error && (
                            <div className="bg-red-500/10 border border-red-500/30 text-red-400 px-6 py-4 rounded-[1.25rem] mb-8 flex items-center gap-4 text-sm font-medium animate-fade-in shadow-lg backdrop-blur-md">
                                <Icon name="alertCircle" className="w-5 h-5 shrink-0" />
                                <span>{error}</span>
                            </div>
                        )}

                        <div className="grid grid-cols-1 gap-12">
                            <section className="mio-card p-10 md:p-14 rounded-[3rem] relative">
                                {activeTab === 'link' ? (
                                    qrResults.length === 0 ? (
                                        <div className="flex flex-col items-center justify-center py-8 text-center relative z-10 animate-fade-in">
                                            <div className="w-24 h-24 bg-slate-800/50 rounded-[2rem] flex items-center justify-center mb-8 shadow-inner border border-white/5">
                                                <Icon name="link" className="text-indigo-400 w-10 h-10" />
                                            </div>
                                            <h3 className="text-[1.75rem] font-extrabold text-white mb-3 tracking-tight">Bağlantı URL'si Ekle</h3>
                                            <p className="text-slate-400 font-medium text-base max-w-sm mb-8 leading-relaxed">
                                                Google Drive veya herhangi bir web bağlantısını aşağıya yapıştırın.
                                            </p>
                                            
                                            <div className="w-full max-w-lg space-y-4">
                                                <input 
                                                    type="url" 
                                                    placeholder="https://drive.google.com/..." 
                                                    value={driveLink}
                                                    onChange={(e) => setDriveLink(e.target.value)}
                                                    className="w-full bg-slate-800/40 border border-slate-600 text-white px-6 py-4 rounded-[1.5rem] focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all placeholder-slate-500"
                                                />
                                                <input 
                                                    type="text" 
                                                    placeholder="Dosya Adı (Örn: drive-dosyasi) - İsteğe Bağlı" 
                                                    value={driveFileName}
                                                    onChange={(e) => setDriveFileName(e.target.value)}
                                                    className="w-full bg-slate-800/40 border border-slate-600 text-white px-6 py-4 rounded-[1.5rem] focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all placeholder-slate-500"
                                                />
                                                <button 
                                                    onClick={generateQRs}
                                                    disabled={isGenerating || !driveLink}
                                                    className={`w-full flex items-center justify-center gap-3 py-5 rounded-[1.5rem] font-bold text-sm tracking-tight transition-all mt-4 ${
                                                        !driveLink
                                                            ? 'bg-slate-800/50 text-slate-500 cursor-not-allowed border border-white/5'
                                                            : 'mio-button-primary'
                                                    }`}
                                                >
                                                    {isGenerating ? (
                                                        <span className="flex items-center gap-2">
                                                            <Icon name="loader2" className="w-5 h-5" />
                                                            İşleniyor...
                                                        </span>
                                                    ) : "Vektörel QR Kodunu Hazırla"}
                                                </button>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="space-y-10 animate-fade-in relative z-10">
                                            <div className="flex items-center justify-between bg-slate-800/50 backdrop-blur-md p-6 md:p-8 rounded-[2rem] border border-white/10 shadow-lg">
                                                <div className="flex items-center gap-5">
                                                    <div className="bg-emerald-500/20 p-3 rounded-2xl text-emerald-400 border border-emerald-500/20">
                                                        <Icon name="checkCircle" className="w-7 h-7" />
                                                    </div>
                                                    <div className="overflow-hidden">
                                                        <p className="font-extrabold text-white text-xl tracking-tight">Bağlantı Hazır</p>
                                                        <p className="text-[11px] text-slate-400 font-bold uppercase tracking-widest mt-1 truncate max-w-[200px] md:max-w-md">{driveLink}</p>
                                                    </div>
                                                </div>
                                                <button onClick={reset} className="bg-slate-800/80 hover:bg-red-500/20 text-slate-400 hover:text-red-400 w-14 h-14 flex items-center justify-center rounded-2xl transition-all border border-white/5 hover:border-red-500/30 shadow-sm shrink-0">
                                                    <Icon name="trash2" className="w-6 h-6" />
                                                </button>
                                            </div>
                                        </div>
                                    )
                                ) : (
                                    data.length === 0 ? (
                                        <div className="flex flex-col items-center justify-center py-8 text-center relative z-10 animate-fade-in">
                                            <div className="w-24 h-24 bg-slate-800/50 rounded-[2rem] flex items-center justify-center mb-8 shadow-inner border border-white/5">
                                                {activeTab === 'birim' 
                                                    ? <Icon name="building" className="text-indigo-400 w-10 h-10" />
                                                    : <Icon name="idCard" className="text-indigo-400 w-10 h-10" />
                                                }
                                            </div>
                                            <h3 className="text-[1.75rem] font-extrabold text-white mb-3 tracking-tight">Veri Setini Yükle</h3>
                                            <p className="text-slate-400 font-medium text-base max-w-sm mb-10 leading-relaxed">
                                                {activeTab === 'birim' 
                                                    ? "Birim verilerini içeren Excel dosyanızı sürükleyin veya seçin."
                                                    : "Personel kartvizit verilerini içeren Excel dosyanızı sürükleyin veya seçin."}
                                            </p>
                                            
                                            <div className="relative group w-full max-w-xs">
                                                <input 
                                                    ref={fileInputRef}
                                                    type="file" 
                                                    accept=".xlsx, .xls" 
                                                    onChange={handleFileUpload}
                                                    className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-20"
                                                />
                                                <div className="mio-button border border-dashed border-slate-600 bg-slate-800/40 text-slate-300 w-full py-6 rounded-[1.5rem] font-bold text-sm tracking-wide transition-all group-hover:border-indigo-500 group-hover:bg-slate-800 group-hover:text-indigo-300 flex items-center justify-center gap-3">
                                                    <Icon name="plus" className="w-5 h-5" />
                                                    Dosya Seçin
                                                </div>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="space-y-10 animate-fade-in relative z-10">
                                            <div className="flex items-center justify-between bg-slate-800/50 backdrop-blur-md p-6 md:p-8 rounded-[2rem] border border-white/10 shadow-lg">
                                                <div className="flex items-center gap-5">
                                                    <div className="bg-emerald-500/20 p-3 rounded-2xl text-emerald-400 border border-emerald-500/20">
                                                        <Icon name="checkCircle" className="w-7 h-7" />
                                                    </div>
                                                    <div>
                                                        <p className="font-extrabold text-white text-xl tracking-tight">{data.length} Kayıt Algılandı</p>
                                                        <p className="text-[11px] text-slate-400 font-bold uppercase tracking-widest mt-1">Sistem İşleme Hazır</p>
                                                    </div>
                                                </div>
                                                <button onClick={reset} className="bg-slate-800/80 hover:bg-red-500/20 text-slate-400 hover:text-red-400 w-14 h-14 flex items-center justify-center rounded-2xl transition-all border border-white/5 hover:border-red-500/30 shadow-sm">
                                                    <Icon name="trash2" className="w-6 h-6" />
                                                </button>
                                            </div>

                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-5">
                                                <button 
                                                    onClick={generateQRs}
                                                    disabled={isGenerating || qrResults.length > 0}
                                                    className={`flex items-center justify-center gap-3 py-6 rounded-[2rem] font-bold text-sm tracking-tight transition-all ${
                                                        qrResults.length > 0 
                                                            ? 'bg-slate-800/50 text-slate-500 cursor-not-allowed border border-white/5'
                                                            : 'mio-button-primary'
                                                    }`}
                                                >
                                                    {isGenerating ? (
                                                        <span className="flex items-center gap-2">
                                                            <Icon name="loader2" className="w-5 h-5" />
                                                            İşleniyor...
                                                        </span>
                                                    ) : (
                                                        qrResults.length > 0 ? "Kodlar Oluşturuldu" : "Vektörel QR Kodları Hazırla"
                                                    )}
                                                </button>

                                                {qrResults.length > 0 && (
                                                    <button 
                                                        onClick={downloadAllAsZip}
                                                        className="mio-button-success flex items-center justify-center gap-3 py-6 rounded-[2rem] font-bold text-sm tracking-tight"
                                                    >
                                                        <Icon name="download" className="w-5 h-5" />
                                                        Tümünü İndir (.ZIP)
                                                    </button>
                                                )}
                                            </div>
                                        </div>
                                    )
                                )}
                            </section>

                            {qrResults.length > 0 && (
                                <div className="space-y-8 animate-fade-in pb-20">
                                    <div className="flex items-end justify-between px-2">
                                        <div>
                                            <h2 className="text-3xl font-extrabold text-white tracking-tight mb-1">
                                                {activeTab === 'birim' ? 'Birim Koleksiyonu' : activeTab === 'vcard' ? 'Kartvizit Koleksiyonu' : 'QR Bağlantı Çıktısı'}
                                            </h2>
                                            <p className="text-slate-400 text-[11px] font-bold uppercase tracking-widest">SVG Format • Kayıpsız Vektör</p>
                                        </div>
                                        <div className="bg-indigo-500/20 text-indigo-300 text-[11px] px-4 py-2.5 rounded-full font-black uppercase tracking-widest border border-indigo-500/30">
                                            {qrResults.length} ADET
                                        </div>
                                    </div>
                                    
                                    <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
                                        {qrResults.map((qr, index) => (
                                            <div key={index} className="qr-hover bg-slate-800/60 backdrop-blur-md border border-slate-700/50 group relative p-5 rounded-[2.5rem] transition-all duration-400 hover:border-indigo-500/50 hover:bg-slate-800/90 hover:shadow-[0_10px_30px_rgba(99,102,241,0.15)] flex flex-col items-center">
                                                <div 
                                                    dangerouslySetInnerHTML={{ __html: qr.svgString }} 
                                                    className="qr-svg-wrapper w-full aspect-square mb-4 transition-transform duration-500 group-hover:scale-[1.03] shadow-inner"
                                                />
                                                <div className="px-1 text-center w-full min-w-0 overflow-hidden">
                                                    <p className="text-[10px] font-extrabold text-indigo-400 uppercase tracking-[0.15em] mb-1 truncate" title={qr.kod}>{qr.kod}</p>
                                                    <p className="text-[13px] text-white font-bold truncate tracking-tight" title={qr.fileName}>
                                                        {qr.fileName}
                                                    </p>
                                                </div>
                                                
                                                <button 
                                                    onClick={() => {
                                                        const blob = new Blob([qr.svgString], { type: 'image/svg+xml' });
                                                        const url = URL.createObjectURL(blob);
                                                        const a = document.createElement('a');
                                                        a.href = url;
                                                        a.download = `${qr.fileName}.svg`;
                                                        a.click();
                                                    }}
                                                    className="qr-download absolute inset-0 m-auto w-14 h-14 flex items-center justify-center bg-indigo-600 text-white rounded-[1.25rem] opacity-0 transition-all duration-300 shadow-[0_0_20px_rgba(79,70,229,0.5)] z-20 hover:bg-indigo-500 hover:scale-110"
                                                >
                                                    <Icon name="fileDown" className="w-6 h-6" />
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
